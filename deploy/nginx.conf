server {
    listen 80;
    server_name _;
    root /var/www/veritytech;
    index index.html;
    # Neomorphic v4 is the default entry (root index.html redirects here)

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Optional: proxy to PM2 dev server
    # location / {
    #     proxy_pass http://127.0.0.1:8500;
    #     proxy_set_header Host $host;
    # }
}

